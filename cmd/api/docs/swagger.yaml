basePath: /
definitions:
  domain.Certification:
    properties:
      certification_id:
        type: integer
      date_issued:
        type: string
      issuer:
        type: string
      name:
        type: string
      profile_id:
        type: integer
      skills:
        items:
          $ref: '#/definitions/domain.Skill'
        type: array
    type: object
  domain.Education:
    properties:
      degree:
        type: string
      education_id:
        type: integer
      end_date:
        type: string
      field:
        type: string
      institution:
        type: string
      profile_id:
        type: integer
      start_date:
        type: string
    type: object
  domain.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  domain.Experience:
    properties:
      company:
        type: string
      description:
        type: string
      end_date:
        type: string
      experience_id:
        type: integer
      is_current:
        type: boolean
      profile_id:
        type: integer
      role:
        type: string
      start_date:
        type: string
    type: object
  domain.Language:
    properties:
      language_id:
        type: integer
      level:
        type: string
      name:
        type: string
      profile_id:
        type: integer
    type: object
  domain.ProfileDTO:
    properties:
      active:
        type: boolean
      birth_date:
        type: string
      certifications:
        items:
          $ref: '#/definitions/domain.Certification'
        type: array
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      educations:
        items:
          $ref: '#/definitions/domain.Education'
        type: array
      email:
        type: string
      experiences:
        items:
          $ref: '#/definitions/domain.Experience'
        type: array
      languages:
        items:
          $ref: '#/definitions/domain.Language'
        type: array
      name:
        type: string
      phone_number:
        type: string
      profile_id:
        type: integer
      projects:
        items:
          $ref: '#/definitions/domain.Project'
        type: array
      skills:
        items:
          $ref: '#/definitions/domain.SkillDTO'
        type: array
      socialMedias:
        items:
          $ref: '#/definitions/domain.SocialMedia'
        type: array
      updated_at:
        type: string
    type: object
  domain.Project:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      link:
        type: string
      name:
        type: string
      profile_id:
        type: integer
      project_id:
        type: integer
      updated_at:
        type: string
    type: object
  domain.Skill:
    properties:
      embeddings:
        items:
          format: float32
          type: number
        type: array
      level:
        type: string
      name:
        type: string
      profile_id:
        type: integer
      skill_id:
        type: integer
    type: object
  domain.SkillDTO:
    properties:
      embeddings:
        items:
          type: number
        type: array
      level:
        type: string
      name:
        type: string
      profile_id:
        type: integer
      skill_id:
        type: string
    type: object
  domain.SocialMedia:
    properties:
      handle:
        type: string
      link:
        type: string
      platform:
        type: string
      profile_id:
        type: integer
      social_media_id:
        type: integer
    type: object
  dto.RoleDescription:
    properties:
      description:
        type: string
      profile_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: API para gerenciamento de perfis e currículos com IA.
  title: Resume GenAI API
  version: "1.0"
paths:
  /profiles/:
    get:
      description: Retorna todos os perfis cadastrados
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ProfileDTO'
            type: array
      summary: Lista todos os perfis
      tags:
      - profiles
    post:
      consumes:
      - application/json
      description: Cria um novo perfil com os dados informados
      parameters:
      - description: Perfil a ser criado
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/domain.ProfileDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.ProfileDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Cria um novo perfil
      tags:
      - profiles
    put:
      consumes:
      - application/json
      description: Atualiza um perfil existente
      parameters:
      - description: Perfil atualizado
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/domain.ProfileDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProfileDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Atualiza um perfil
      tags:
      - profiles
  /profiles/{id}:
    delete:
      description: Remove um perfil pelo ID
      parameters:
      - description: ID do perfil
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Remove um perfil
      tags:
      - profiles
    get:
      description: Retorna um perfil pelo ID
      parameters:
      - description: ID do perfil
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProfileDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Busca perfil por ID
      tags:
      - profiles
  /profiles/add-certification:
    post:
      consumes:
      - application/json
      description: Adiciona uma nova certificação a um perfil existente
      parameters:
      - description: Certificação a ser adicionada
        in: body
        name: certification
        required: true
        schema:
          $ref: '#/definitions/domain.Certification'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Certification'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona uma certificação ao perfil
      tags:
      - profiles
  /profiles/add-education:
    post:
      consumes:
      - application/json
      description: Adiciona uma nova formação educacional a um perfil existente
      parameters:
      - description: Educação a ser adicionada
        in: body
        name: education
        required: true
        schema:
          $ref: '#/definitions/domain.Education'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Education'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona educação ao perfil
      tags:
      - profiles
  /profiles/add-experience:
    post:
      consumes:
      - application/json
      description: Adiciona uma nova experiência profissional a um perfil existente
      parameters:
      - description: Experiência a ser adicionada
        in: body
        name: experience
        required: true
        schema:
          $ref: '#/definitions/domain.Experience'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Experience'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona experiência ao perfil
      tags:
      - profiles
  /profiles/add-language:
    post:
      consumes:
      - application/json
      description: Adiciona um novo idioma a um perfil existente
      parameters:
      - description: Idioma a ser adicionado
        in: body
        name: language
        required: true
        schema:
          $ref: '#/definitions/domain.Language'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Language'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona idioma ao perfil
      tags:
      - profiles
  /profiles/add-project:
    post:
      consumes:
      - application/json
      description: Adiciona um novo projeto a um perfil existente
      parameters:
      - description: Projeto a ser adicionado
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/domain.Project'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona projeto ao perfil
      tags:
      - profiles
  /profiles/add-skill:
    post:
      consumes:
      - application/json
      description: Adiciona uma nova habilidade a um perfil existente
      parameters:
      - description: Habilidade a ser adicionada
        in: body
        name: skill
        required: true
        schema:
          $ref: '#/definitions/domain.Skill'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Skill'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
      summary: Adiciona habilidade ao perfil
      tags:
      - profiles
  /profiles/add-social-media:
    post:
      consumes:
      - application/json
      description: Adiciona uma nova rede social a um perfil existente
      parameters:
      - description: Rede social a ser adicionada
        in: body
        name: socialMedia
        required: true
        schema:
          $ref: '#/definitions/domain.SocialMedia'
      produces:
